        <i class="bi bi-search"></i>

<h1 style="margin-top: 10px;">   
    <a style="font-size: 25px;" id="compartir" href="#"><i class="bi bi-share-fill"></i></a>

<style>
    .cantidades-card {
  padding: 6px;
}

/* Ícono */
.cart-icon {
  font-size: 22px;
  color: #ffffff;
  transition: transform 0.2s ease, color 0.2s ease;
}

/* 🔥 Badge pequeño tipo app */
.cart-badge {
  top: 0;
  transform: translate(50%, -40%);
  
  font-size: 17px;
  min-width: 16px;
  height: 18px;
  padding: 0 4px;

  background: #2cf8cc;
  color: #0c0502;

  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 600;
  line-height: 1;
}
</style>
<h1 style="margin-top: 10px;">
    <a href="#"
        class="nav-link position-relative cantidades-card d-inline-flex align-items-center"
        onclick="verCarrito('/ver_carrito')"
        data-bs-toggle="modal" data-bs-target="#exampleModal"
        aria-label="Carrito">

        <i class="bi bi-cart-fill cart-icon"></i>

        <span id="cont_compras" class="cart-badge position-absolute"
            {% if total_compra == 0 %}style="display:none"{% endif %}>
            {{ total_compra }}
        </span>
        </a>
</h1>
