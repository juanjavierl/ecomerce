<footer id="footer" class="py-3 border-top">
  <div class="container">
      <div class="row align-items-center">

          <!-- Columna izquierda -->
          <div class="col-md-6 text-center text-md-end mb-3 mb-md-2">
              <small>
                  &copy; {{ dashboard.author|default:"AMCEB" }}
                  - Todos los derechos reservados.
              </small>

              <br>

              {% if user.is_authenticated %}
                  <a href="/salir/">Cerrar Sesión</a>
              {% else %}
                  <a href="#login"
                     data-bs-toggle="modal"
                     data-bs-target="#exampleModal"
                     onclick="login('/login_user/')">
                      Iniciar Sesión
                  </a>
              {% endif %}
          </div>

          <!-- Columna derecha -->
          <div class="col-md-6 text-center text-md-start mb-3 mb-md-2">
            Contáctanos en: 
              <a href="https://api.whatsapp.com/send?phone={{dashboard.mobile}}" target="_blank">
                  <i class="bx bxl-whatsapp fs-4"></i>
              </a>

              {% for red in rrss %}
                  <a href="{{ red.enlace }}" target="_blank" class="ms-2">
                      <i class="bx bxl-{{ red.rrss }} fs-4"></i>
                  </a>
              {% endfor %}
          </div>

      </div>
  </div>
</footer>
