{% load crispy_forms_tags %}
<h2 class="accordion-header">
    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
        data-bs-target="#collapseSeven" aria-expanded="false" aria-controls="collapseSeven">
        <strong>Agregar Mapa del Negocio</strong>
    </button>
</h2>
<div id="collapseSeven" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
    <div class="accordion-body row d-flex justify-content-center">
        
        <div class="forn-envio col-lg-5 d-flex align-items-stretch">
            <div class="input-group">
                <form action="/add_huvicacion/" method="post" id="form_add_mapa">
                    {% csrf_token %}
                    {{form_huvicacion|crispy}}
                    <button type="submit" class="btn btn-primary btn-sm">Registrar</button>
                </form>
            </div>
        </div>
        <div class="col-lg-5 align-items-stretch">
            <div class="info" id="map" style="margin-top: 20px; width: 100%; height: 440px;">

            </div>
        </div>
        
        <div class="alert alert-success info_map_registro d-flex align-items-center gap-3 shadow-sm rounded-4 p-4" role="alert">
                {% include 'company/notificaciones/info_address_company.html' with address=address %}
           
        </div>
       
        
    </div>
</div>
<script>
    if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
              function(position) {
                  document.getElementById('id_latitud').value = position.coords.latitude;
                  document.getElementById('id_longitud').value = position.coords.longitude;

                  console.log(position.coords.latitude);
                  console.log(position.coords.longitude);
              },
              function(error) {
                  alert("No se pudo obtener la ubicación.");
              }
          );
      } else {
          alert("Tu navegador no soporta geolocalización.");
      }
    $('#form_add_mapa').on('submit', function (e) {
        e.preventDefault();
        $.ajax({
            type: 'POST',
            url: $(this).attr('action'),
            data: $(this).serialize(),
            success: function (resp) {
                if (resp.success) {
                    $('.toast-body').addClass('alert alert-success');
                    $('.toast-body').fadeIn(1000).html(resp.success);
                    mostrar_notificacion();
                    $.ajax({
                        type: 'get',
                        url: '/info_address_company/',
                        success: function (resp) {
                            $('.info_map_registro').fadeIn(1000).html(resp);
                        }
                    });

                } else {
                    $('.toast-body').addClass('alert alert-danger');
                    $('.toast-body').fadeIn(1000).html('Ya existe un registro');
                    mostrar_notificacion();
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                $('.toast-body').addClass('alert alert-danger');
                $('.toast-body').fadeIn(1000).html('Ya existe un registro');
                mostrar_notificacion('Ya existe un registro');
            }
        });
    });

    function del_address_comp(urls) {
        $.ajax({
            type: 'GET',
            url: urls,
            success: function (resp) {
                if (resp.error) {
                    $(".invalid_ct").html(resp.error);
                } else {

                    $(".modal-content").html(resp);
                }
            },
            error: function (xhr, ajaxOptions, thrownError) {
                $('.toast-body').addClass('alert alert-danger');
                $('.toast-body').fadeIn(1000).html(thrownError);
                mostrar_notificacion();
            }
        });
        return false;
    }

</script>
</script>
